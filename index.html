<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datara 🔎 | Centro de Mandos</title>

    <meta name="verify-admitad" content="d23c1d0743" />

    <style>
        :root {
            --azul-fondo: #010c1e; 
            --azul-acento: #007bff;
            --verde-exito: #00f2c3;
            --texto-suave: #b0c4de;
            --blanco: #ffffff;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--azul-fondo); 
            color: var(--blanco); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        .app-container { 
            width: 100%; 
            max-width: 420px; 
            padding: 30px 20px; 
            text-align: center; 
        }
        
        /* Logo centrado y profesional */
        .app-logo { 
            width: 150px; 
            height: auto; 
            margin-bottom: 15px; 
        }

        .tagline { 
            font-size: 14px; 
            color: var(--texto-suave); 
            margin-bottom: 30px; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Banner de "Último Post" (Para mover tráfico a Blogger) */
        .news-banner {
            background: rgba(0, 123, 255, 0.2);
            border: 1px solid var(--azul-acento);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 25px;
            font-size: 14px;
            text-decoration: none;
            color: var(--blanco);
            display: block;
            transition: 0.3s;
        }
        .news-banner:active { transform: scale(0.98); }
        .news-banner span { color: var(--verde-exito); font-weight: bold; }

        /* Estilo de Botones tipo Aplicación */
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            color: var(--blanco);
            text-decoration: none;
            padding: 20px;
            margin-bottom: 12px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        /* Botón de Ofertas Resaltado */
        .btn-featured { 
            background: linear-gradient(135deg, var(--azul-acento), #00c6ff); 
            border: none;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        .nav-btn:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.12);
        }

        .icon { margin-right: 12px; font-size: 20px; }

        .footer { 
            margin-top: 50px; 
            font-size: 10px; 
            color: #4b5d73; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <img src="logo-datara.png" alt="Datara" class="app-logo">
        <div class="tagline">Tips Reales • Ahorro • Seguridad</div>

        <a href="https://tupagina.blogspot.com" class="news-banner">
            <span>NUEVO:</span> ¿Cómo evitar el spam en tu correo? ⮕
        </a>

        <a href="TU_LINK_DE_ADMITAD" class="nav-btn btn-featured">
            <span class="icon">🎁</span> Ofertas y Promociones
        </a>

        <a href="#" class="nav-btn">
            <span class="icon">💰</span> Páginas que sí pagan
        </a>

        <a href="https://tupagina.blogspot.com" class="nav-btn">
            <span class="icon">📝</span> Ver Blog de Tips Completo
        </a>

        <a href="https://www.facebook.com/Dataraonline" target="_blank" class="nav-btn" style="border-color: #1877F2;">
            <span class="icon">🔵</span> Comunidad en Facebook
        </a>

        <div class="footer">DATARA 🔎 2026 • MÉXICO</div>
    </div>

</body>
    </html>
