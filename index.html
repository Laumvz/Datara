<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datara 🔎 | Tips Reales</title>

    <meta name="verify-admitad" content="d23c1d0743" />

    <style>
        :root {
            --azul-profundo: #010c1e; 
            --azul-brillante: #007bff;
            --verde-menta: #00f2c3;
            --texto-suave: #b0c4de;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--azul-profundo); 
            color: white; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        .wrapper { 
            width: 100%; 
            max-width: 400px; 
            padding: 50px 20px; 
            text-align: center; 
        }
        
        .logo-datara { 
            width: 180px; 
            height: auto; 
            margin-bottom: 25px; 
            display: inline-block;
        }

        .bio { 
            font-size: 16px; 
            color: var(--texto-suave); 
            margin-bottom: 40px; 
            line-height: 1.6; 
        }
        
        /* Estilo de Botones Reparado */
        .link-btn {
            display: block;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .link-btn:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.15);
        }

        .destacado { 
            background: linear-gradient(135deg, var(--azul-brillante), var(--verde-menta)); 
            color: #010c1e; 
            border: none; 
        }

        .footer { 
            margin-top: 80px; 
            font-size: 10px; 
            color: #5d7a9d; 
            letter-spacing: 3px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="logo-datara.png" alt="Datara Logo" class="logo-datara">
        
        <p class="bio">Aprovecha tu tiempo y dinero con tips reales. <br>Sin estafas, solo ahorro. 🇲🇽</p>

        <a href="#" class="link-btn destacado">💸 Gana bonos con Mercado Pago</a>
        
        <a href="TU_LINK_DE_ADMITAD_AQUI" class="link-btn">🎁 Ofertas Flash del día</a>
        
        <a href="https://www.facebook.com/tu-pagina" target="_blank" class="link-btn" style="color: #1877F2;">
            🔵 Síguenos en Facebook
        </a>

        <div class="footer">DATARA 🔎 2026</div>
    </div>

</body>
    </html>
