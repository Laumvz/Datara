<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datara 🔎 | Tips y Ahorro</title>
    <style>
        /* 1. RESETEO PARA QUE NADA SE MUEVA */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            background-color: #010c1e; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            display: flex;
            justify-content: center;
            color: white;
            min-height: 100vh;
        }

        /* 2. EL CONTENEDOR QUE CENTRA TODO */
        .app-wrapper {
            width: 100%;
            max-width: 400px; /* Tamaño ideal de celular */
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra horizontalmente */
        }

        .logo-datara {
            width: 180px;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 14px;
            color: #b0c4de;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 3. BOTONES (Ancho total y centrados) */
        .btn-link {
            width: 100%; /* Ocupa todo el ancho disponible */
            display: block;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            text-decoration: none;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        /* Botón que resalta (Ofertas) */
        .btn-destacado {
            background: #007bff;
            border: none;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        /* Botón de Facebook */
        .btn-fb { border-color: #1877F2; color: #1877F2; }

        .footer {
            margin-top: 40px;
            font-size: 11px;
            color: #4b5d73;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <img src="logo-datara.png" alt="Datara" class="logo-datara">
        <p class="tagline">Información Clara 🔎</p>

        <a href="TU_LINK_ADMITAD" class="btn-link btn-destacado">
            🎁 Ofertas y Promociones
        </a>

        <a href="TU_LINK_BLOGGER" class="btn-link">
            📝 Leer Tips en el Blog
        </a>

        <a href="#" class="btn-link">
            💰 Páginas que sí pagan
        </a>

        <a href="https://www.facebook.com/Dataraonline" target="_blank" class="btn-link btn-fb">
            🔵 Comunidad en Facebook
        </a>

        <div class="footer">DATARA 🔎 2026</div>

    </div>

</body>
            </html>
